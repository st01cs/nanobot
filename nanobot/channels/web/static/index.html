<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>🐈 nanobot</h1>
            <p class="subtitle">Web Chat</p>

            <div id="auth-forms">
                <!-- Login Form -->
                <div id="login-form">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <input type="text" id="login-username" placeholder="Username" required>
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="submit">Login</button>
                    </form>
                    <p>
                        Don't have an account?
                        <a href="#" id="show-register">Register</a>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="register-form" style="display: none;">
                    <h2>Register</h2>
                    <form id="registerForm">
                        <input type="text" id="reg-username" placeholder="Username (3-20 chars)" required minlength="3" maxlength="20">
                        <input type="password" id="reg-password" placeholder="Password (6+ chars)" required minlength="6">
                        <button type="submit">Register</button>
                    </form>
                    <p>
                        Already have an account?
                        <a href="#" id="show-login">Login</a>
                    </p>
                </div>
            </div>

            <div id="error-message" class="error"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
